<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Calculator Pro</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<!-- Theme Button -->

<button id="themeBtn">

    <span class="theme-icon">
        ◐
    </span>

</button>

<div class="container">

<div class="calculator">

<!-- Header -->

<div class="header">

    <h1>
        Calculator Pro
    </h1>

    <div id="liveTime">
        Loading...
    </div>

</div>

<!-- Display -->

<div class="display-section">

    <div
    id="expression"
    class="expression">

        0

    </div>

    <!-- Memory Indicator -->

    <div
    id="memoryIndicator"
    class="memory-indicator">

    </div>

    <div
    id="result"
    class="result">

        0

    </div>

</div>

<!-- Memory Buttons -->

<div class="memory-buttons">

    <button id="mcBtn">
        MC
    </button>

    <button id="mrBtn">
        MR
    </button>

    <button id="mPlusBtn">
        M+
    </button>

    <button id="mMinusBtn">
        M-
    </button>

</div>

<!-- Scientific Buttons -->

<div class="scientific-buttons">

    <button class="sqrt-btn">
        √
    </button>

    <button class="square-btn">
        x²
    </button>

    <button class="inverse-btn">
        1/x
    </button>

    <button id="percentBtn">
        %
    </button>

</div>


<div class="buttons">

    <button class="clear">
        C
    </button>

    <button class="delete">
        ⌫
    </button>

    <button>
        (
    </button>

    <button>
        )
    </button>

    <button>
        7
    </button>

    <button>
        8
    </button>

    <button>
        9
    </button>

    <button class="operator">
        /
    </button>

    <button>
        4
    </button>

    <button>
        5
    </button>

    <button>
        6
    </button>

    <button class="operator">
        *
    </button>

    <button>
        1
    </button>

    <button>
        2
    </button>

    <button>
        3
    </button>

    <button class="operator">
        -
    </button>

    <button class="zero">
        0
    </button>

    <button>
        .
    </button>

    <button class="operator">
        +
    </button>

</div>

<!-- Full Width Equal Button -->

<button class="equal">

    =

</button>

</div>

<!-- History Panel -->

<div class="history-panel">

    <div class="history-header">

        <h2>
            Calculation History
        </h2>

        <button
        id="clearHistory">

            Clear

        </button>

    </div>

    <div
    id="historyList">

    </div>

</div>

</div>

<!-- End Container -->

<script src="script.js"></script>

</body>

</html>
